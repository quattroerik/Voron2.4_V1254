[gcode_macro M109]
rename_existing: M99109
gcode:
    #Parameters
    {% set s = params.S|float %}
    
    M104 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}  ; Set hotend temp
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s} MAXIMUM={s+1}   ; Wait for hotend temp (within 1 degree)
    {% endif %}

[gcode_macro M190]
rename_existing: M99190
gcode:
    #Parameters
    {% set s = params.S|float %}

    M140 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}   ; Set bed temp
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={s} MAXIMUM={s+1}  ; Wait for bed temp (within 1 degree)
    {% endif %}


[gcode_macro PARK_SWITCH_OFF]
gcode:
    {% if printer.toolhead.homed_axes != "xyz" %}
      #not homed -> dont move!
    {% else %}
          G91
          G0 Z5
          G90
          G0 X148 Y25 F15000 # (minimize sag of gantry)
          #turn off heating
          TURN_OFF_HEATERS
          STATUS_OFF
          ##turn off motors
          M84
          #turn off electronics fan
          SET_FAN_SPEED FAN=electronics SPEED=0
    {% endif %}

[gcode_macro CHANGE_NOZZLE]
gcode:
    M104 S145 # set inital hotent temperature
    _CG28 #home if not already homed
    _CQGL #qgl if not done already
    {% set target_z = 125 %}
    {% set current_z = printer.toolhead.position.z %}
    {% if current_z < target_z %}
      G0 Z{target_z} F3000
    {% endif %}
    M109 S225
    G1 E-50 F300
    G1 X150 Y5 F15000



  
[gcode_macro CUSTOM_BACKLASH]
description: DO BACKLASH COMP for all positions
gcode:
    _CG28 #home if not already homed
    _CQGL #QGL if not alreay QGL
    G90
    G0 Z10

    RESPOND MSG="Front left"
    G0 X20 Y5 F15000
    CARTOGRAPHER_ESTIMATE_BACKLASH

    RESPOND MSG="Back left"
    G0 Z5
    G0 X20 Y250 F15000
    CARTOGRAPHER_ESTIMATE_BACKLASH

    RESPOND MSG="Back right"
    G0 Z5
    G0 X275 Y250 F15000
    CARTOGRAPHER_ESTIMATE_BACKLASH

    RESPOND MSG="Front right"
    G0 Z5
    G0 X275 Y5 F15000
    CARTOGRAPHER_ESTIMATE_BACKLASH

    RESPOND MSG="Center"
    G0 Z5
    G0 X150 Y150 F15000
    CARTOGRAPHER_ESTIMATE_BACKLASH


[gcode_macro CLEAN_NOZZLE]
description: Wipe the nozzle on the brush
gcode:
    STATUS_CLEANING

    _CG28 #home if not already homed
    _CQGL #QGL if not already QGL

    {% set brush_clean_accel = 1500 %}
    {% set brush_over_y_axis = True %}
    {% set brush_size = 35 %}
    {% set brushes = 6 %}
   
    {% set St = 300 * 60 %}
    {% set Sz = 15 * 60 %}
    {% set Sc = 100 * 60 %}

    {% set Bx = 40 %} #center of the brush
    {% set By = 301 %}
    {% set Bz = 1 %}


    # Set the cleaning acceleration prior to any movement
    {% set saved_accel = printer.toolhead.max_accel %}
    SET_VELOCITY_LIMIT ACCEL={brush_clean_accel}

    # Move to purge zone (left side)
    G90

    #Move over Purge Bucket
    G0 X15 Y303 F12000
    
    # Move to center of the brush
    G1 X{Bx} Y{By} F{St}
    G1 Z{Bz} F{St}
    # Wipe procedure
    G91
    {% if brush_over_y_axis %}
        {% for wipe in range(brushes) %}
            G1 Y-4 F{Sc}
            G1 Y+4 F{Sc}
        {% endfor %}
    {% endif %}

    # Move to the right side of the brush
    G1 X+{ (brush_size/2)} F{Sc}
  
    # Brush procedure
    {% for wipe in range(brushes) %}
        G1 X-{ (brush_size) } F{Sc}
        G1 X+{ (brush_size) } F{Sc}
    {% endfor %}

    G90

    # Reset acceleration values to what it was before
    SET_VELOCITY_LIMIT ACCEL={saved_accel}

    #Move away from brush
    G0 Z5 F6000



[gcode_macro _CQGL]
gcode:
    {% if printer.quad_gantry_level.applied == False %}
        _CG28
        QUAD_GANTRY_LEVEL
        G28 Z        
    {% endif %}

[gcode_macro _CG28]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        STATUS_HOMING                                         # Set LEDs to homing-mode
        SET_FAN_SPEED FAN=electronics SPEED=0.45 # power on electronics fan
        G28 ; home if not already homed
    {% endif %}


[gcode_macro _SERVICE_POSITION]
gcode:
    _CG28
    G90
    G1 X150 Y25 Z117

[gcode_macro QUAD_GANTRY_LEVEL]
rename_existing: _QUAD_GANTRY_LEVEL
gcode:
    # If QGL is not applied, first run a course calibration
    {% if printer.quad_gantry_level.applied == False %}
        _QUAD_GANTRY_LEVEL RETRY_TOLERANCE=1.0
    {% endif %}
    # then perform fine QGL down to desired spec
    # this has to be a separate macro call so the results of the above call will be visible!
    _FINE_QUAD_GANTRY_LEVEL

[gcode_macro _FINE_QUAD_GANTRY_LEVEL]
gcode:
    {% if printer.quad_gantry_level.applied == True %}
        # go for full quality at reduced probing height
        _QUAD_GANTRY_LEVEL HORIZONTAL_MOVE_Z=2.0  # <- set your preferred probing height here!
    {% else %}
        # This should never happen, just perform the full calibration using the defaults
        {action_respond_info("Fine QGL called without calling course QGL first!")}
        _QUAD_GANTRY_LEVEL  # default behavior, no speedup
    {% endif %}


#from ellis print tuning guide
#https://ellis3dp.com/Print-Tuning-Guide/articles/useful_macros/dump_variables.html
[gcode_macro DUMP_VARIABLES]
gcode:
    {% set filter_name = params.NAME|default('')|string|lower %}
    {% set filter_value = params.VALUE|default('')|string|lower %}
    {% set show_cfg = params.SHOW_CFG|default(0)|int %}
    
    {% set out = [] %}

    {% for key1 in printer %}
        {% for key2 in printer[key1] %}
            {% if (show_cfg or not (key1|lower == 'configfile' and key2|lower in ['config', 'settings'])) and (filter_name in key1|lower or filter_name in key2|lower) and filter_value in printer[key1][key2]|string|lower %}
                {% set dummy = out.append("printer['%s'].%s = %s" % (key1, key2, printer[key1][key2])) %}
            {% endif %}
        {% else %}
            {% if filter_name in key1|lower and filter_value in printer[key1]|string|lower %}
                {% set dummy = out.append("printer['%s'] = %s" % (key1, printer[key1])) %}
            {% endif %}
        {% endfor %}
    {% endfor %}
    
    {action_respond_info(out|join("\n"))}


[gcode_macro _MY_CUSTOM_PARK_MACRO]
gcode:
    {% set restore = params.RESTORE|default("0")|int %}
    {% set x = printer.toolhead.position.x|float %}
    {% set y = printer.toolhead.position.y|float %}
    {% set z = printer.toolhead.position.z|float %}
    {% set f = params.F|default(12000)|int %}

    {% if restore == 1 %}

        # Restore position provided by Happy Hare
        G1 X{x} Y{y} F{f}

    {% else %}

        # Lift only if below Z=3
        {% if z < 3.0 %}
            G1 Z5 F6000
        {% endif %}

        # First check if we are between X=0 and X=3
        {% if x < 3 %}

            # In front of the depressor pin: move only in X
            {% if y < 211 %}
                G1 X4 F12000

            # Behind / near the depressor pin: move farther away
            {% elif y <= 230 %}
                G1 X10 F12000

            {% endif %}

        {% endif %}

        # Move to park position
        G1 Y301 F12000
        G1 X3 F12000

        # Final position
        G1 Z1.9 F3000

    {% endif %}

###########################################################################
# Overriden cutting motion macro to enable immediate parking following the 
# cutting motion to reduce ooze.
#
[gcode_macro _CUT_TIP_DO_CUT_MOTION]
description: Helper to do a single cut movement
gcode:
    {% set pin_park_x_loc = params.PIN_PARK_X_LOC | float %}
    {% set pin_park_y_loc = params.PIN_PARK_Y_LOC | float %}
    {% set vars = printer['gcode_macro _MMU_CUT_TIP_VARS'] %}
    {% set cutting_axis = vars['cutting_axis'] %}

    {% set pin_loc = vars['pin_loc_compressed']|default(-999)|float %}
    {% if pin_loc != -999 %}
        # Old one-dimensional pin_loc_compressed config
        {% if cutting_axis == "x" %}
            {% set pin_loc_compressed_x = pin_loc %}
            {% set pin_loc_compressed_y = pin_park_y_loc %}
        {% else %}
            {% set pin_loc_compressed_x = pin_park_x_loc %}   
            {% set pin_loc_compressed_y = pin_loc %}
        {% endif %}
    {% else %}
        # New config
        {% set pin_loc_compressed_x, pin_loc_compressed_y = vars.pin_loc_compressed_xy|map('float') %}
    {% endif %}
        
    {% set cut_fast_move_fraction = vars['cut_fast_move_fraction']|float %}
    {% set cut_fast_move_speed = vars['cut_fast_move_speed']|float %}
    {% set cut_slow_move_speed = vars['cut_slow_move_speed']|float %}
    {% set cut_dwell_time = vars['cut_dwell_time']|float %}
    {% set evacuate_speed = vars['evacuate_speed']|float %}
    {% set rip_length = vars['rip_length']|float %}
    {% set rip_speed = vars['rip_speed']|float %}
    {% set safe_margin_x, safe_margin_y = vars.safe_margin_xy|map('float') %}
    {% set travel_speed = vars['travel_speed']|float %}

    {% set fast_slow_transition_loc_x = (pin_loc_compressed_x - pin_park_x_loc) * cut_fast_move_fraction + pin_park_x_loc|float %}
    {% set fast_slow_transition_loc_y = (pin_loc_compressed_y - pin_park_y_loc) * cut_fast_move_fraction + pin_park_y_loc|float %}
    G1 X{fast_slow_transition_loc_x} Y{fast_slow_transition_loc_y} F{cut_fast_move_speed * 60} # Fast move to initiate contact of the blade with filament
    G1 X{pin_loc_compressed_x} Y{pin_loc_compressed_y} F{cut_slow_move_speed * 60} # Do the cut in slow move

    G4 P{cut_dwell_time}
    {% if rip_length > 0 %}
        G1 E-{rip_length} F{rip_speed * 60}
    {% endif %}

    G1 X{pin_park_x_loc} Y{pin_park_y_loc} F{evacuate_speed * 60} # Evacuate

    # Move clear of pin on non-cutting axis to prevent toolhead collision on subsequent travel moves
    G1 X{pin_park_x_loc + 5} F{travel_speed * 60}
