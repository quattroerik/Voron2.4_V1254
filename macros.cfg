
## based on https://github.com/jontek2/A-better-print_start-macro
[gcode_macro PRINT_START]
gcode:
  # This part fetches data from your slicer. Such as bed, extruder, and chamber temps and size of your printer.
  {% set target_bed = params.BED|int %}
  {% set target_extruder = params.EXTRUDER|int %}
  {% set target_chamber = params.CHAMBER|default("45")|int %}
  {% set pressure_advance = params.PA|default("0.04")|float %}
  {% set material = params.MATERIAL|default("default")|string %}
  {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
  {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}
  
  UPDATE_DELAYED_GCODE ID=SWITCH_OFF_NEVERMORE_DELAYED DURATION=0            # Just in case last print was <15 min and nevermore is still on, disable delayed switch off
  SET_FAN_SPEED FAN=nevermore_fan SPEED=1             # Turn on the nevermore
  SET_FAN_SPEED FAN=rox SPEED=0 # turn off chamber filter system

  #set pressure advance
  SET_PRESSURE_ADVANCE ADVANCE={pressure_advance}


  ##  Cartographer - reset offset and load PEI model
  SET_GCODE_OFFSET Z=0                                 # Set offset to 0  

  M104 S145 # set inital hotent temperature
  M140 S{target_bed}  #set bed temp before starting homing

  # Home the printer, set absolute positioning and update the Stealthburner LEDs.
  
  _CG28 #home if not already homed
  
  G90                                                   # Absolute position
  G90 E0

  ##  Uncomment for bed mesh (1 of 2 for bed mesh)
  BED_MESH_CLEAR                                       # Clear old saved bed mesh (if any)

  # Check if the bed temp is higher than 90c - if so then trigger a heatsoak.
  {% if params.BED|int > 90 %}
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"           # Display info on display
    STATUS_HEATING                                      # Set LEDs to heating-mode
    #M106 S255                                           # Turn on the PT-fan

    G0 X{x_wait} Y{y_wait} Z15                          # Go to center of the bed
    M190 S{target_bed}                                  # Set the target temp for the bed
    SET_DISPLAY_TEXT MSG="Heatsoak: {target_chamber}c"  # Display info on display
    TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={target_chamber}   # Waits for chamber temp

  # If the bed temp is not over 90c, then skip the heatsoak and just heat up to set temp with a 5 min soak

  {% else %}
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"           # Display info on display
    STATUS_HEATING                                      # Set LEDs to heating-mode
    G0 X{x_wait} Y{y_wait} Z15                          # Go to center of the bed
    M190 S{target_bed}                                  # Set the target temp for the bed
    # to be changed to check chamber temp -> manually 
    #SET_DISPLAY_TEXT MSG="Soak for 5 min"               # Display info on display
    #G4 P300000                                          # Wait 5 min for the bedtemp to stabilize
  {% endif %}

  #check if extruder temperature is high  
  {% if printer['extruder'].temperature|int > 150 %}
    M118 'Extruder temp above 150, cool down and wait 3 mintues to ensure stable temperature for carto'
    #set temperature low, enable fan, wait some time until temp is cooled down.
    M106 S255
    M109 S100
    G4 P18000   #wait 3 minutes
    M106 S0
  #{% else %}
  #  M118 'Extruder temp below >150'
  {% endif %}

  # Heat hotend to 150c. This helps with getting a correct Z-home.
  SET_DISPLAY_TEXT MSG="Hotend: 145c"                   # Display info on display
  M109 S145                                             # Heat hotend to 145c

  ##  Uncomment for V2.4 (Quad gantry level AKA QGL)
  SET_DISPLAY_TEXT MSG="Leveling"                      # Display info on display
  STATUS_LEVELING                                      # Set LEDs to leveling-mode
  QUAD_GANTRY_LEVEL                                    # Level the printer via QGL
  #G0 Z10 # Lift Z again for Z homing
  G28 Z                                                # Home Z again after QGL

  # X Axis twist compensation
  #CARTOGRAPHER_AXIS_TWIST_COMPENSATION

  ##  Uncomment for bed mesh (2 of 2 for bed mesh)
  SET_DISPLAY_TEXT MSG="Bed mesh"                      # Display info on display
  STATUS_MESHING                                       # Set LEDs to bed mesh-mode
  BED_MESH_CALIBRATE ADAPTIVE=1                        # Start the bed mesh (add ADAPTIVE=1) for adaptive bed mesh

  CLEAN_NOZZLE                                         #Clean Nozzle before Calibrate Z

  #move quickly to Calibrate Z location
  G0 Z10
  G0 X148 Y150

  STATUS_CALIBRATING_Z  
  CARTOGRAPHER_TOUCH_HOME # Calibrate z offset only with hot nozzle

  # Heat up the hotend up to target via data from slicer
  SET_DISPLAY_TEXT MSG="Hotend: {target_extruder}c"     # Display info on display
  STATUS_HEATING                                        # Set LEDs to heating-mode  
  M104 S{target_extruder}                               # Heat the hotend to set temp



[gcode_macro PRINT_END]
gcode:
    {% set z = printer.toolhead.position.z|float %}
    
    SET_FILAMENT_SENSOR SENSOR=extruder_sensor ENABLE=0
    #move Z little up from parking position
    {% if z < 3.0 %}
      G1 Z5 F6000
    {% endif %}
            
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 60 %}
    
    TURN_OFF_HEATERS
    SET_FAN_SPEED FAN=rox SPEED=1  # turn on chamber filter system
    BED_MESH_CLEAR
    UPDATE_DELAYED_GCODE ID=SWITCH_OFF_NEVERMORE_DELAYED DURATION=900
    STATUS_OFF


[delayed_gcode SWITCH_OFF_NEVERMORE_DELAYED]
gcode:
    SET_FAN_SPEED FAN=nevermore_fan SPEED=0
    SET_FAN_SPEED FAN=rox SPEED=0   
#   A list of G-Code commands to execute when the delay duration has
#   elapsed. G-Code templates are supported. This parameter must be
#   provided.
initial_duration: 1200
#   The duration of the initial delay (in seconds). If set to a
#   non-zero value the delayed_gcode will execute the specified number
#   of seconds after the printer enters the "ready" state. This can be
#   useful for initialization procedures or a repeating delayed_gcode.
#   If set to 0 the delayed_gcode will not execute on startup.
#   Default is 0.


